name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: |
          go build ./cmd/frf
          go build ./cmd/frf-tui

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...
